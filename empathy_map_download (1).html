<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共感マップ ダウンロード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f5f7fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    text-align: center;
  }
  .icon { font-size: 56px; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
  .subtitle { font-size: 14px; color: #888; font-weight: 300; margin-bottom: 32px; line-height: 1.7; }
  .preview {
    background: #f8f9ff;
    border: 1px solid #e8eaf6;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 28px;
    text-align: left;
  }
  .preview-title { font-size: 11px; font-weight: 700; color: #7c6af7; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }
  .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .preview-item .label { font-size: 10px; color: #aaa; margin-bottom: 2px; }
  .preview-item .value { font-size: 12px; color: #333; line-height: 1.5; white-space: pre-line; }
  .persona-row { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; font-size: 13px; color: #444; font-weight: 500; }
  .dl-btn {
    background: linear-gradient(135deg, #7c6af7, #a78bfa);
    color: #fff; border: none; border-radius: 12px;
    padding: 16px 40px; font-size: 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.05em; width: 100%; margin-bottom: 12px;
  }
  .dl-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,106,247,0.35); }
  .dl-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
  .note { font-size: 12px; color: #bbb; font-weight: 300; }
  .error-msg { background: #fff3f3; border: 1px solid #ffcdd2; border-radius: 10px; padding: 16px; color: #c62828; font-size: 13px; margin-bottom: 20px; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🗺</div>
  <h1>共感マップが完成しました</h1>
  <p class="subtitle">以下の内容でPowerPointファイルを生成します。<br>ダウンロード後、自由に編集できます。</p>
  <div class="error-msg" id="errorMsg"></div>
  <div class="preview" id="previewArea" style="display:none">
    <div class="preview-title">📋 内容プレビュー</div>
    <div class="persona-row" id="prevPersona"></div>
    <div class="preview-grid" id="prevGrid"></div>
  </div>
  <button class="dl-btn" id="dlBtn" onclick="generatePPTX()">📥 PowerPointをダウンロード</button>
  <p class="note">PowerPoint / Keynote / Googleスライドで編集できます</p>
</div>

const FIELD_LABELS = {
  think: '考え・感じていること',
  say:   '言う・やっていること',
  see:   '見ていること',
  hear:  '聞いていること',
  pain:  'PAIN',
  gain:  'GAIN'
};

function getParams() {
  const search = location.search.slice(1);
  const dataParam = new URLSearchParams(search).get('data');
  if (dataParam) {
    try { return JSON.parse(decodeURIComponent(dataParam)); } catch(e) {}
    try { return JSON.parse(dataParam); } catch(e) {}
  }
  return null;
}

// \n（文字列としての\n）も本物の改行も両方対応
function normalizeNewlines(str) {
  if (!str) return '';
  return str.replace(/\\n/g, '\n').replace(/\r/g, '');
}

window.onload = () => {
  const d = getParams();
  if (!d) {
    showError('データが見つかりません。DifyのチャットからURLを開いてください。');
    document.getElementById('dlBtn').disabled = true;
    return;
  }
  document.getElementById('previewArea').style.display = 'block';
  document.getElementById('prevPersona').textContent = '👤 ' + (d.persona || '');
  const grid = document.getElementById('prevGrid');
  ['think','say','see','hear','pain','gain'].forEach(k => {
    if (d[k]) {
      const item = document.createElement('div');
      item.className = 'preview-item';
      const val = normalizeNewlines(d[k]);
      item.innerHTML = '<div class="label">' + FIELD_LABELS[k] + '</div><div class="value">' + val + '</div>';
      grid.appendChild(item);
    }
  });
};

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.style.display = 'block';
  el.textContent = msg;
}

function escapeXml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildParagraphs(text) {
  const normalized = normalizeNewlines(text || '');
  const lines = normalized.split('\n').filter(l => l.trim());
  if (!lines.length) return '<a:p><a:pPr algn="ctr"/><a:r><a:rPr sz="900" b="0"><a:solidFill><a:srgbClr val="3F3F3F"/></a:solidFill></a:rPr><a:t></a:t></a:r></a:p>';
  return lines.map(line =>
    '<a:p><a:pPr algn="ctr"/><a:r><a:rPr sz="900" b="0"><a:solidFill><a:srgbClr val="3F3F3F"/></a:solidFill></a:rPr><a:t>' + escapeXml(line) + '</a:t></a:r></a:p>'
  ).join('');
}

// XMLのテキストボックスを名前で検索して中身を置換する（正規表現不使用・確実な方法）
function replaceTextBox(xml, boxName, newContent) {
  const nameMarker = 'name="' + boxName + '"';
  const idx = xml.indexOf(nameMarker);
  if (idx === -1) {
    console.warn('TextBox not found:', boxName);
    return xml;
  }
  // lstStyle/> の位置を探す
  const lstStyleEnd = xml.indexOf('<a:lstStyle/>', idx);
  if (lstStyleEnd === -1) return xml;
  const contentStart = lstStyleEnd + '<a:lstStyle/>'.length;

  // </p:txBody> の位置を探す
  const txBodyEnd = xml.indexOf('</p:txBody>', contentStart);
  if (txBodyEnd === -1) return xml;

  // 置換
  return xml.slice(0, contentStart) + newContent + xml.slice(txBodyEnd);
}

async function generatePPTX() {
  const btn = document.getElementById('dlBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';

  try {
    const d = getParams();
    if (!d) throw new Error('データがありません');

    const binary = atob(TEMPLATE_B64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

    const zip = await JSZip.loadAsync(bytes);
    let xml = await zip.file('ppt/slides/slide1.xml').async('string');

    // ペルソナ置換
    const personaText = '＜' + (d.persona || '') + '＞';
    const personaPara = '<a:p><a:pPr marL="0" marR="0" indent="0" algn="l"><a:lnSpc><a:spcPct val="100000"/></a:lnSpc><a:spcBef><a:spcPts val="0"/></a:spcBef><a:spcAft><a:spcPts val="0"/></a:spcAft><a:buNone/></a:pPr><a:r><a:rPr lang="ja-JP" sz="1100" b="0"><a:solidFill><a:srgbClr val="3F3F3F"/></a:solidFill></a:rPr><a:t>' + escapeXml(personaText) + '</a:t></a:r></a:p>';
    xml = replaceTextBox(xml, 'Google Shape;712;p32', personaPara);

    // 6つのコンテンツ置換
    const boxes = [
      { name: 'TextBox 712', content: d.think },
      { name: 'TextBox 713', content: d.say },
      { name: 'TextBox 714', content: d.see },
      { name: 'TextBox 715', content: d.hear },
      { name: 'TextBox 716', content: d.pain },
      { name: 'TextBox 717', content: d.gain },
    ];
    for (const box of boxes) {
      xml = replaceTextBox(xml, box.name, buildParagraphs(box.content));
    }

    zip.file('ppt/slides/slide1.xml', xml);

    const blob = await zip.generateAsync({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.presentationml.presentation'
    });

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '共感マップ_' + (d.persona || 'output').slice(0, 20) + '.pptx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    btn.textContent = '✅ ダウンロード完了！';
    btn.style.background = 'linear-gradient(135deg, #34d399, #10b981)';

  } catch(err) {
    console.error(err);
    showError('エラー: ' + err.message);
    btn.disabled = false;
    btn.textContent = '📥 PowerPointをダウンロード';
  }
}
